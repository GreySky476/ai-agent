spring.application.name=ai-agent
spring.profiles.include=secret

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_customer_service
spring.datasource.username=ai_user
spring.datasource.password=ai_password
spring.datasource.driver-class-name=org.postgresql.Driver

# LangChain4j OpenRouter (OpenAI Protocol) Configuration
langchain4j.open-ai.chat-model.base-url=https://openrouter.ai/api/v1
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:YOUR_KEY_HERE}
langchain4j.open-ai.chat-model.model-name=z-ai/glm-4.5-air:free

# LangChain4j PGVector Configuration
langchain4j.pgvector.host=localhost
langchain4j.pgvector.port=5432
langchain4j.pgvector.user=ai_user
langchain4j.pgvector.password=ai_password
langchain4j.pgvector.database=ai_customer_service
langchain4j.pgvector.table=knowledge_base
langchain4j.pgvector.dimension=1536

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
